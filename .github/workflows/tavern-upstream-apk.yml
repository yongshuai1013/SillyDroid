name: tavern-upstream-apk

on:
  push:
    branches:
      - master
      - main
    paths:
      - .github/workflows/tavern-upstream-apk.yml
      - stai-build-config.json
      - android-tavern/**
      - gradle/**
      - gradlew
      - gradlew.bat
      - scripts/**
  workflow_dispatch:
    inputs:
      tavern_tag:
        description: 指定上游 SillyTavern tag；auto/latest 时自动取最新 GitHub Release tag
        required: false
        default: auto
        type: string
      build_type:
        description: APK 构建类型
        required: false
        default: auto
        type: choice
        options:
          - auto
          - debug
          - release
      force_rebuild:
        description: 强制重建 rootfs / dependency / server / apk
        required: false
        default: false
        type: boolean
      publish_release:
        description: 是否上传到当前仓库 GitHub Release
        required: false
        default: true
        type: boolean
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

concurrency:
  group: tavern-upstream-apk
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      tavern_tag: ${{ steps.plan.outputs.tavern_tag }}
      safe_tag: ${{ steps.plan.outputs.safe_tag }}
      build_type: ${{ steps.plan.outputs.build_type }}
      host_version_base: ${{ steps.plan.outputs.host_version_base }}
      host_version: ${{ steps.plan.outputs.host_version }}
      repo_revision_count: ${{ steps.plan.outputs.repo_revision_count }}
      upstream_release_index: ${{ steps.plan.outputs.upstream_release_index }}
      version_name: ${{ steps.plan.outputs.version_name }}
      version_code: ${{ steps.plan.outputs.version_code }}
      rootfs_changed: ${{ steps.plan.outputs.rootfs_changed }}
      dependency_changed: ${{ steps.plan.outputs.dependency_changed }}
      server_changed: ${{ steps.plan.outputs.server_changed }}
      apk_changed: ${{ steps.plan.outputs.apk_changed }}
      force_rebuild: ${{ steps.plan.outputs.force_rebuild }}
      publish_release: ${{ steps.plan.outputs.publish_release }}
      rootfs_release_tag: ${{ steps.plan.outputs.rootfs_release_tag }}
      rootfs_release_title: ${{ steps.plan.outputs.rootfs_release_title }}
      rootfs_asset_name: ${{ steps.plan.outputs.rootfs_asset_name }}
      rootfs_metadata_name: ${{ steps.plan.outputs.rootfs_metadata_name }}
      dependency_release_tag: ${{ steps.plan.outputs.dependency_release_tag }}
      dependency_release_title: ${{ steps.plan.outputs.dependency_release_title }}
      dependency_index_name: ${{ steps.plan.outputs.dependency_index_name }}
      server_release_tag: ${{ steps.plan.outputs.server_release_tag }}
      server_release_title: ${{ steps.plan.outputs.server_release_title }}
      server_asset_name: ${{ steps.plan.outputs.server_asset_name }}
      server_manifest_name: ${{ steps.plan.outputs.server_manifest_name }}
      artifact_name: ${{ steps.plan.outputs.artifact_name }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      release_title: ${{ steps.plan.outputs.release_title }}
      release_prerelease: ${{ steps.plan.outputs.release_prerelease }}
      rootfs_release_dir: ${{ steps.plan.outputs.rootfs_release_dir }}
      dependency_release_dir: ${{ steps.plan.outputs.dependency_release_dir }}
      server_release_dir: ${{ steps.plan.outputs.server_release_dir }}
      apk_release_dir: ${{ steps.plan.outputs.apk_release_dir }}
    steps:
      - name: Checkout build metadata
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            android-tavern/gradle.properties
            scripts/read-stai-build-config.py
            scripts/resolve-tavern-build-plan.sh
            stai-build-config.json

      - name: Resolve build plan
        id: plan
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tavern_tag || 'auto' }}
          REQUESTED_BUILD_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.build_type || 'auto' }}
          FORCE_REBUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild || 'false' }}
          PUBLISH_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release || 'true' }}
          COMPARE_BASE: ${{ github.event_name == 'push' && github.event.before || '' }}
          COMPARE_HEAD: ${{ github.sha }}
        run: |
          set -euo pipefail

          bash ./scripts/resolve-tavern-build-plan.sh \
            --tavern-tag "$REQUESTED_TAG" \
            --build-type "$REQUESTED_BUILD_TYPE" \
            --compare-base "$COMPARE_BASE" \
            --compare-head "$COMPARE_HEAD" >> "$GITHUB_OUTPUT"

          printf 'force_rebuild=%s\n' "$FORCE_REBUILD" >> "$GITHUB_OUTPUT"
          printf 'publish_release=%s\n' "$PUBLISH_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Append plan summary
        run: |
          {
            echo '### Tavern upstream APK plan'
            echo
            echo '- Tavern tag: ${{ steps.plan.outputs.tavern_tag }}'
            echo '- Build type: ${{ steps.plan.outputs.build_type }}'
            echo '- Host version: ${{ steps.plan.outputs.host_version }}'
            echo '- Force rebuild: ${{ steps.plan.outputs.force_rebuild }}'
            echo '- Publish release: ${{ steps.plan.outputs.publish_release }}'
            echo '- Rootfs changed: ${{ steps.plan.outputs.rootfs_changed }}'
            echo '- Dependency changed: ${{ steps.plan.outputs.dependency_changed }}'
            echo '- Server changed: ${{ steps.plan.outputs.server_changed }}'
            echo '- APK changed: ${{ steps.plan.outputs.apk_changed }}'
          } >> "$GITHUB_STEP_SUMMARY"

  rootfs_prereq:
    needs: plan
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.resolve.outputs.source }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout rootfs packaging sources
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            android-tavern/app/src/main/assets/bootstrap/scripts
            scripts
            stai-build-config.json

      - name: Restore rootfs build caches
        if: needs.plan.outputs.force_rebuild != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/stai-android-toolchain
            ~/.cache/stai-android-rootfs
          key: tavern-rootfs-${{ runner.os }}-${{ hashFiles('scripts/android-build-common.sh', 'scripts/build-tavern-android-runtime-image.sh', 'scripts/sync-android-rootfs.sh', 'android-tavern/app/src/main/assets/bootstrap/scripts/**', 'stai-build-config.json') }}
          restore-keys: |
            tavern-rootfs-${{ runner.os }}-

      - name: Resolve rootfs prerequisite source
        id: resolve
        run: |
          set -euo pipefail

          rootfs_dir="$GITHUB_WORKSPACE/${{ needs.plan.outputs.rootfs_release_dir }}"
          rootfs_path="$rootfs_dir/${{ needs.plan.outputs.rootfs_asset_name }}"
          metadata_path="$rootfs_dir/${{ needs.plan.outputs.rootfs_metadata_name }}"
          source='built'

          mkdir -p "$rootfs_dir"

          if [ '${{ needs.plan.outputs.force_rebuild }}' != 'true' ] && [ '${{ needs.plan.outputs.rootfs_changed }}' != 'true' ]; then
            if gh release view '${{ needs.plan.outputs.rootfs_release_tag }}' --repo '${{ github.repository }}' > /dev/null 2>&1; then
              gh release download '${{ needs.plan.outputs.rootfs_release_tag }}' \
                --repo '${{ github.repository }}' \
                --dir "$rootfs_dir" \
                --pattern '${{ needs.plan.outputs.rootfs_asset_name }}' \
                --pattern '${{ needs.plan.outputs.rootfs_metadata_name }}' \
                --clobber || true
            fi

            if [ -f "$rootfs_path" ] && [ -f "$metadata_path" ]; then
              source='release'
            fi
          fi

          printf 'source=%s\n' "$source" >> "$GITHUB_OUTPUT"

      - name: Build rootfs prerequisite
        if: steps.resolve.outputs.source == 'built'
        run: |
          set -euo pipefail

          bash ./scripts/build-tavern-android-runtime-image.sh \
            --runtime-rid linux-arm64 \
            --output "$GITHUB_WORKSPACE/${{ needs.plan.outputs.rootfs_release_dir }}/${{ needs.plan.outputs.rootfs_asset_name }}" \
            --artifact-name 'tavern-rootfs-linux-arm64' \
            --metadata-out "$GITHUB_WORKSPACE/${{ needs.plan.outputs.rootfs_release_dir }}/${{ needs.plan.outputs.rootfs_metadata_name }}"

      - name: Finalize rootfs prerequisite
        run: |
          set -euo pipefail

          rootfs_dir="$GITHUB_WORKSPACE/${{ needs.plan.outputs.rootfs_release_dir }}"
          rootfs_path="$rootfs_dir/${{ needs.plan.outputs.rootfs_asset_name }}"
          metadata_path="$rootfs_dir/${{ needs.plan.outputs.rootfs_metadata_name }}"
          sha_path="$rootfs_path.sha256"

          test -f "$rootfs_path"
          test -f "$metadata_path"
          sha256sum "$rootfs_path" | awk '{print $1}' > "$sha_path"

      - name: Publish rootfs prerequisite release
        if: steps.resolve.outputs.source == 'built'
        run: |
          set -euo pipefail

          rootfs_dir="$GITHUB_WORKSPACE/${{ needs.plan.outputs.rootfs_release_dir }}"
          release_notes_file="$(mktemp)"

          {
            echo '## Tavern rootfs prerequisite'
            echo
            echo '- Host version: ${{ needs.plan.outputs.host_version }}'
            echo '- Runtime RID: linux-arm64'
            echo '- Source commit: ${{ github.sha }}'
          } > "$release_notes_file"

          if ! gh release view '${{ needs.plan.outputs.rootfs_release_tag }}' --repo '${{ github.repository }}' > /dev/null 2>&1; then
            gh release create '${{ needs.plan.outputs.rootfs_release_tag }}' \
              --repo '${{ github.repository }}' \
              --target '${{ github.sha }}' \
              --title '${{ needs.plan.outputs.rootfs_release_title }}' \
              --notes-file "$release_notes_file"
          fi

          gh release edit '${{ needs.plan.outputs.rootfs_release_tag }}' \
            --repo '${{ github.repository }}' \
            --title '${{ needs.plan.outputs.rootfs_release_title }}' \
            --notes-file "$release_notes_file" > /dev/null

          gh release upload '${{ needs.plan.outputs.rootfs_release_tag }}' \
            "$rootfs_dir/${{ needs.plan.outputs.rootfs_asset_name }}" \
            "$rootfs_dir/${{ needs.plan.outputs.rootfs_metadata_name }}" \
            "$rootfs_dir/${{ needs.plan.outputs.rootfs_asset_name }}.sha256" \
            --repo '${{ github.repository }}' \
            --clobber

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.plan.outputs.rootfs_release_tag }}
          path: ${{ needs.plan.outputs.rootfs_release_dir }}
          if-no-files-found: error

      - name: Append rootfs summary
        run: |
          {
            echo '### Rootfs prerequisite'
            echo
            echo '- Source: ${{ steps.resolve.outputs.source }}'
            echo '- Release tag: ${{ needs.plan.outputs.rootfs_release_tag }}'
            echo '- Asset: ${{ needs.plan.outputs.rootfs_asset_name }}'
          } >> "$GITHUB_STEP_SUMMARY"

  dependency_prereq:
    needs: plan
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.resolve.outputs.source }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout dependency packaging sources
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts
            stai-build-config.json

      - name: Restore dependency packaging caches
        if: needs.plan.outputs.force_rebuild != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/stai-android-toolchain
            ~/.cache/stai-tavern-dependency-packs
          key: tavern-dependency-packs-${{ runner.os }}-${{ hashFiles('scripts/android-build-common.sh', 'scripts/build-tavern-dependency-packs.sh', 'stai-build-config.json') }}
          restore-keys: |
            tavern-dependency-packs-${{ runner.os }}-

      - name: Resolve dependency prerequisite source
        id: resolve
        run: |
          set -euo pipefail

          dependency_dir="$GITHUB_WORKSPACE/${{ needs.plan.outputs.dependency_release_dir }}"
          source='built'

          mkdir -p "$dependency_dir"

          if [ '${{ needs.plan.outputs.force_rebuild }}' != 'true' ] && [ '${{ needs.plan.outputs.dependency_changed }}' != 'true' ]; then
            if gh release view '${{ needs.plan.outputs.dependency_release_tag }}' --repo '${{ github.repository }}' > /dev/null 2>&1; then
              gh release download '${{ needs.plan.outputs.dependency_release_tag }}' \
                --repo '${{ github.repository }}' \
                --dir "$dependency_dir" \
                --pattern '*.zip' \
                --pattern '*.manifest.json' \
                --pattern '${{ needs.plan.outputs.dependency_index_name }}' \
                --clobber || true
            fi

            if [ -f "$dependency_dir/${{ needs.plan.outputs.dependency_index_name }}" ]; then
              source='release'
            fi
          fi

          printf 'source=%s\n' "$source" >> "$GITHUB_OUTPUT"

      - name: Build dependency prerequisite
        if: steps.resolve.outputs.source == 'built'
        run: |
          set -euo pipefail

          bash ./scripts/build-tavern-dependency-packs.sh \
            --runtime-rid linux-arm64 \
            --target-root "$GITHUB_WORKSPACE/${{ needs.plan.outputs.dependency_release_dir }}"

      - name: Verify dependency prerequisite files
        run: |
          set -euo pipefail

          dependency_dir="$GITHUB_WORKSPACE/${{ needs.plan.outputs.dependency_release_dir }}"
          test -f "$dependency_dir/${{ needs.plan.outputs.dependency_index_name }}"

      - name: Publish dependency prerequisite release
        if: steps.resolve.outputs.source == 'built'
        run: |
          set -euo pipefail
          shopt -s nullglob

          dependency_dir="$GITHUB_WORKSPACE/${{ needs.plan.outputs.dependency_release_dir }}"
          release_notes_file="$(mktemp)"
          assets=("$dependency_dir"/*.zip "$dependency_dir"/*.manifest.json "$dependency_dir/${{ needs.plan.outputs.dependency_index_name }}")

          {
            echo '## Tavern dependency packs prerequisite'
            echo
            echo '- Host version: ${{ needs.plan.outputs.host_version }}'
            echo '- Runtime RID: linux-arm64'
            echo '- Source commit: ${{ github.sha }}'
          } > "$release_notes_file"

          if ! gh release view '${{ needs.plan.outputs.dependency_release_tag }}' --repo '${{ github.repository }}' > /dev/null 2>&1; then
            gh release create '${{ needs.plan.outputs.dependency_release_tag }}' \
              --repo '${{ github.repository }}' \
              --target '${{ github.sha }}' \
              --title '${{ needs.plan.outputs.dependency_release_title }}' \
              --notes-file "$release_notes_file"
          fi

          gh release edit '${{ needs.plan.outputs.dependency_release_tag }}' \
            --repo '${{ github.repository }}' \
            --title '${{ needs.plan.outputs.dependency_release_title }}' \
            --notes-file "$release_notes_file" > /dev/null

          gh release upload '${{ needs.plan.outputs.dependency_release_tag }}' \
            "${assets[@]}" \
            --repo '${{ github.repository }}' \
            --clobber

      - name: Upload dependency artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.plan.outputs.dependency_release_tag }}
          path: ${{ needs.plan.outputs.dependency_release_dir }}
          if-no-files-found: error

      - name: Append dependency summary
        run: |
          {
            echo '### Dependency prerequisite'
            echo
            echo '- Source: ${{ steps.resolve.outputs.source }}'
            echo '- Release tag: ${{ needs.plan.outputs.dependency_release_tag }}'
            echo '- Index: ${{ needs.plan.outputs.dependency_index_name }}'
          } >> "$GITHUB_STEP_SUMMARY"

  server_prereq:
    needs: plan
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.resolve.outputs.source }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout server source inputs
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            android-tavern/server-overlay
            scripts
            stai-build-config.json

      - name: Restore server source packaging caches
        if: needs.plan.outputs.force_rebuild != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/stai-android-toolchain
            ~/.cache/stai-tavern-android-bootstrap
            ~/.npm
          key: tavern-server-source-${{ runner.os }}-${{ needs.plan.outputs.safe_tag }}-${{ hashFiles('scripts/android-build-common.sh', 'scripts/sync-tavern-android-bootstrap.sh', 'android-tavern/server-overlay/**', 'stai-build-config.json') }}
          restore-keys: |
            tavern-server-source-${{ runner.os }}-${{ needs.plan.outputs.safe_tag }}-
            tavern-server-source-${{ runner.os }}-

      - name: Resolve server source prerequisite availability
        id: resolve
        run: |
          set -euo pipefail

          server_dir="$GITHUB_WORKSPACE/${{ needs.plan.outputs.server_release_dir }}"
          server_path="$server_dir/${{ needs.plan.outputs.server_asset_name }}"
          server_manifest_path="$server_dir/${{ needs.plan.outputs.server_manifest_name }}"
          source='built'

          mkdir -p "$server_dir"

          if [ '${{ needs.plan.outputs.force_rebuild }}' != 'true' ] && [ '${{ needs.plan.outputs.server_changed }}' != 'true' ]; then
            if gh release view '${{ needs.plan.outputs.server_release_tag }}' --repo '${{ github.repository }}' > /dev/null 2>&1; then
              gh release download '${{ needs.plan.outputs.server_release_tag }}' \
                --repo '${{ github.repository }}' \
                --dir "$server_dir" \
                --pattern '${{ needs.plan.outputs.server_asset_name }}' \
                --pattern '${{ needs.plan.outputs.server_manifest_name }}' \
                --clobber || true
            fi

            if [ -f "$server_path" ] && [ -f "$server_manifest_path" ]; then
              source='release'
            fi
          fi

          printf 'source=%s\n' "$source" >> "$GITHUB_OUTPUT"

      - name: Build server source prerequisite
        if: steps.resolve.outputs.source == 'built'
        run: |
          set -euo pipefail

          bash ./scripts/sync-tavern-android-bootstrap.sh \
            --runtime-rid linux-arm64 \
            --tag '${{ needs.plan.outputs.tavern_tag }}' \
            --target-root "$GITHUB_WORKSPACE/${{ needs.plan.outputs.server_release_dir }}"

      - name: Verify server source prerequisite files
        run: |
          set -euo pipefail

          server_dir="$GITHUB_WORKSPACE/${{ needs.plan.outputs.server_release_dir }}"
          test -f "$server_dir/${{ needs.plan.outputs.server_asset_name }}"
          test -f "$server_dir/${{ needs.plan.outputs.server_manifest_name }}"

      - name: Publish server source prerequisite release
        if: steps.resolve.outputs.source == 'built'
        run: |
          set -euo pipefail

          server_dir="$GITHUB_WORKSPACE/${{ needs.plan.outputs.server_release_dir }}"
          release_notes_file="$(mktemp)"

          {
            echo '## Tavern server source prerequisite'
            echo
            echo '- Host version: ${{ needs.plan.outputs.host_version }}'
            echo '- Tavern tag: ${{ needs.plan.outputs.tavern_tag }}'
            echo '- Runtime RID: linux-arm64'
            echo '- Source commit: ${{ github.sha }}'
          } > "$release_notes_file"

          if ! gh release view '${{ needs.plan.outputs.server_release_tag }}' --repo '${{ github.repository }}' > /dev/null 2>&1; then
            gh release create '${{ needs.plan.outputs.server_release_tag }}' \
              --repo '${{ github.repository }}' \
              --target '${{ github.sha }}' \
              --title '${{ needs.plan.outputs.server_release_title }}' \
              --notes-file "$release_notes_file"
          fi

          gh release edit '${{ needs.plan.outputs.server_release_tag }}' \
            --repo '${{ github.repository }}' \
            --title '${{ needs.plan.outputs.server_release_title }}' \
            --notes-file "$release_notes_file" > /dev/null

          gh release upload '${{ needs.plan.outputs.server_release_tag }}' \
            "$server_dir/${{ needs.plan.outputs.server_asset_name }}" \
            "$server_dir/${{ needs.plan.outputs.server_manifest_name }}" \
            --repo '${{ github.repository }}' \
            --clobber

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.plan.outputs.server_release_tag }}
          path: ${{ needs.plan.outputs.server_release_dir }}
          if-no-files-found: error

      - name: Append server source summary
        run: |
          {
            echo '### Server source prerequisite'
            echo
            echo '- Source: ${{ steps.resolve.outputs.source }}'
            echo '- Release tag: ${{ needs.plan.outputs.server_release_tag }}'
            echo '- Asset: ${{ needs.plan.outputs.server_asset_name }}'
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    needs:
      - plan
      - rootfs_prereq
      - dependency_prereq
      - server_prereq
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.resolve.outputs.source }}
      release_asset_name: ${{ steps.collect.outputs.release_asset_name }}
      apk_sha256: ${{ steps.collect.outputs.apk_sha256 }}
      apk_size_bytes: ${{ steps.collect.outputs.apk_size_bytes }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve APK build source
        id: resolve
        run: |
          set -euo pipefail

          release_dir="$GITHUB_WORKSPACE/${{ needs.plan.outputs.apk_release_dir }}"
          release_asset_name='${{ needs.plan.outputs.artifact_name }}.apk'
          release_asset_path="$release_dir/$release_asset_name"
          release_sha256_path="$release_asset_path.sha256"
          release_metadata_path="$release_dir/${{ needs.plan.outputs.artifact_name }}.update.json"
          source='built'

          mkdir -p "$release_dir"

          if [ '${{ needs.plan.outputs.force_rebuild }}' != 'true' ] \
            && [ '${{ needs.plan.outputs.apk_changed }}' != 'true' ] \
            && [ '${{ needs.rootfs_prereq.outputs.source }}' != 'built' ] \
            && [ '${{ needs.dependency_prereq.outputs.source }}' != 'built' ] \
            && [ '${{ needs.server_prereq.outputs.source }}' != 'built' ]; then
            if gh release view '${{ needs.plan.outputs.release_tag }}' --repo '${{ github.repository }}' > /dev/null 2>&1; then
              gh release download '${{ needs.plan.outputs.release_tag }}' \
                --repo '${{ github.repository }}' \
                --dir "$release_dir" \
                --pattern "$release_asset_name" \
                --pattern "$release_asset_name.sha256" \
                --pattern '${{ needs.plan.outputs.artifact_name }}.update.json' \
                --clobber || true
            fi

            if [ -f "$release_asset_path" ] && [ -f "$release_sha256_path" ] && [ -f "$release_metadata_path" ]; then
              source='release'
            fi
          fi

          printf 'source=%s\n' "$source" >> "$GITHUB_OUTPUT"

      - name: Checkout APK build sources
        if: steps.resolve.outputs.source == 'built'
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
            android-tavern
            gradle
            gradlew
            gradlew.bat
            scripts
            stai-build-config.json

      - name: Restore Tavern Android build caches
        if: steps.resolve.outputs.source == 'built'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/stai-android-toolchain
            ~/.cache/stai-android-rootfs
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.npm
          key: tavern-upstream-apk-${{ runner.os }}-${{ hashFiles('scripts/*.sh', 'stai-build-config.json', 'android-tavern/build.gradle.kts', 'android-tavern/settings.gradle.kts', 'android-tavern/gradle.properties', 'android-tavern/app/build.gradle.kts', 'gradle/wrapper/*', 'gradlew') }}
          restore-keys: |
            tavern-upstream-apk-${{ runner.os }}-

      - name: Install Android build prerequisites
        if: steps.resolve.outputs.source == 'built'
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y unzip zip binutils xz-utils

      - name: Prepare release signing inputs
        if: steps.resolve.outputs.source == 'built'
        id: signing
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ '${{ needs.plan.outputs.build_type }}' != 'release' ]; then
            printf 'signing_source=%s\n' 'none' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          configured_secret_count=0
          for variable_name in ANDROID_RELEASE_KEYSTORE_BASE64 ANDROID_RELEASE_STORE_PASSWORD ANDROID_RELEASE_KEY_ALIAS ANDROID_RELEASE_KEY_PASSWORD; do
            if [ -n "${!variable_name:-}" ]; then
              configured_secret_count="$((configured_secret_count + 1))"
            fi
          done

          if [ "$configured_secret_count" -eq 4 ]; then
            keystore_path="$RUNNER_TEMP/android-release.keystore"
            printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"

            {
              printf 'keystore_path=%s\n' "$keystore_path"
              printf 'store_password=%s\n' "$ANDROID_RELEASE_STORE_PASSWORD"
              printf 'key_alias=%s\n' "$ANDROID_RELEASE_KEY_ALIAS"
              printf 'key_password=%s\n' "$ANDROID_RELEASE_KEY_PASSWORD"
              printf 'signing_source=%s\n' 'github-secrets'
            } >> "$GITHUB_OUTPUT"

            exit 0
          fi

          if [ "$configured_secret_count" -ne 0 ]; then
            echo 'GitHub Actions release 签名 secrets 只配置了一部分；请补全 4 个变量，或全部删掉后使用仓库内置 keystore。' >&2
            exit 1
          fi

          repo_keystore_path="$GITHUB_WORKSPACE/android-tavern/app/signing/release.keystore"
          repo_signing_properties_path="$GITHUB_WORKSPACE/android-tavern/app/signing/release-signing.properties"

          if [ -f "$repo_keystore_path" ] && [ -f "$repo_signing_properties_path" ]; then
            printf 'signing_source=%s\n' 'repo' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo 'release 构建缺少签名配置；请配置 GitHub Actions secrets，或将 android-tavern/app/signing/release.keystore 与 android-tavern/app/signing/release-signing.properties 提交进仓库。' >&2
          exit 1

      - name: Download rootfs artifact
        if: steps.resolve.outputs.source == 'built'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.plan.outputs.rootfs_release_tag }}
          path: ${{ needs.plan.outputs.rootfs_release_dir }}

      - name: Download dependency artifact
        if: steps.resolve.outputs.source == 'built'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.plan.outputs.dependency_release_tag }}
          path: ${{ needs.plan.outputs.dependency_release_dir }}

      - name: Download server artifact
        if: steps.resolve.outputs.source == 'built'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.plan.outputs.server_release_tag }}
          path: ${{ needs.plan.outputs.server_release_dir }}

      - name: Build Tavern APK
        if: steps.resolve.outputs.source == 'built'
        run: |
          set -euo pipefail

          export STAI_TAVERN_ANDROID_BUILD_ROOT="$RUNNER_TEMP/stai-tavern-android-build"
          export STAI_ANDROID_HOST_VERSION='${{ needs.plan.outputs.host_version }}'
          export STAI_ANDROID_UPSTREAM_VERSION='${{ needs.plan.outputs.tavern_tag }}'
          export STAI_ANDROID_VERSION_NAME='${{ needs.plan.outputs.version_name }}'
          export STAI_ANDROID_VERSION_CODE='${{ needs.plan.outputs.version_code }}'

          if [ '${{ needs.plan.outputs.build_type }}' = 'release' ] && [ '${{ steps.signing.outputs.signing_source }}' = 'github-secrets' ]; then
            export STAI_ANDROID_RELEASE_KEYSTORE_PATH='${{ steps.signing.outputs.keystore_path }}'
            export STAI_ANDROID_RELEASE_KEYSTORE_PASSWORD='${{ steps.signing.outputs.store_password }}'
            export STAI_ANDROID_RELEASE_KEY_ALIAS='${{ steps.signing.outputs.key_alias }}'
            export STAI_ANDROID_RELEASE_KEY_PASSWORD='${{ steps.signing.outputs.key_password }}'
          fi

          bash ./scripts/build-tavern-android-apk.sh \
            --runtime-rid linux-arm64 \
            --build-type '${{ needs.plan.outputs.build_type }}' \
            --tag '${{ needs.plan.outputs.tavern_tag }}'

          source_apk_path="$GITHUB_WORKSPACE/${{ needs.plan.outputs.apk_release_dir }}/app-${{ needs.plan.outputs.build_type }}.apk"
          release_dir="$GITHUB_WORKSPACE/${{ needs.plan.outputs.apk_release_dir }}"
          release_asset_name='${{ needs.plan.outputs.artifact_name }}.apk'
          release_asset_path="$release_dir/$release_asset_name"
          release_sha256_path="$release_asset_path.sha256"
          release_metadata_path="$release_dir/${{ needs.plan.outputs.artifact_name }}.update.json"

          cp "$source_apk_path" "$release_asset_path"

          apk_sha256="$(sha256sum "$release_asset_path" | awk '{print $1}')"
          apk_size_bytes="$(stat -c '%s' "$release_asset_path")"
          printf '%s\n' "$apk_sha256" > "$release_sha256_path"

          cat > "$release_metadata_path" <<EOF
          {
            "github_repository": "${{ github.repository }}",
            "release_tag": "${{ needs.plan.outputs.release_tag }}",
            "host_version": "${{ needs.plan.outputs.host_version }}",
            "upstream_version": "${{ needs.plan.outputs.tavern_tag }}",
            "build_type": "${{ needs.plan.outputs.build_type }}",
            "version_name": "${{ needs.plan.outputs.version_name }}",
            "apk_asset_name": "$release_asset_name",
            "apk_sha256": "$apk_sha256",
            "apk_size_bytes": $apk_size_bytes
          }
          EOF

      - name: Collect APK metadata
        id: collect
        run: |
          set -euo pipefail

          release_dir="$GITHUB_WORKSPACE/${{ needs.plan.outputs.apk_release_dir }}"
          release_asset_name='${{ needs.plan.outputs.artifact_name }}.apk'
          release_asset_path="$release_dir/$release_asset_name"
          release_sha256_path="$release_asset_path.sha256"

          test -f "$release_asset_path"
          test -f "$release_sha256_path"

          apk_sha256="$(cat "$release_sha256_path")"
          apk_size_bytes="$(stat -c '%s' "$release_asset_path")"

          {
            printf 'release_asset_name=%s\n' "$release_asset_name"
            printf 'apk_sha256=%s\n' "$apk_sha256"
            printf 'apk_size_bytes=%s\n' "$apk_size_bytes"
          } >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.plan.outputs.artifact_name }}
          path: |
            ${{ needs.plan.outputs.apk_release_dir }}/*.apk
            ${{ needs.plan.outputs.apk_release_dir }}/*.sha256
            ${{ needs.plan.outputs.apk_release_dir }}/*.update.json
          if-no-files-found: error

      - name: Append build summary
        run: |
          {
            echo '### Tavern Android build'
            echo
            echo '- Source: ${{ steps.resolve.outputs.source }}'
            echo '- Tavern tag: ${{ needs.plan.outputs.tavern_tag }}'
            echo '- Build type: ${{ needs.plan.outputs.build_type }}'
            echo '- Host version: ${{ needs.plan.outputs.host_version }}'
            echo '- Rootfs source: ${{ needs.rootfs_prereq.outputs.source }}'
            echo '- Dependency source: ${{ needs.dependency_prereq.outputs.source }}'
            echo '- Server source: ${{ needs.server_prereq.outputs.source }}'
            echo '- Release asset: ${{ steps.collect.outputs.release_asset_name }}'
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    needs:
      - plan
      - rootfs_prereq
      - dependency_prereq
      - server_prereq
      - build
    if: needs.plan.outputs.publish_release == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout release notes sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.plan.outputs.artifact_name }}
          path: ${{ needs.plan.outputs.apk_release_dir }}

      - name: Publish GitHub release
        run: |
          set -euo pipefail

          release_notes_file="$(mktemp)"
          release_dir="$GITHUB_WORKSPACE/${{ needs.plan.outputs.apk_release_dir }}"
          prerelease_flag=''

          if [ '${{ needs.plan.outputs.release_prerelease }}' = 'true' ]; then
            prerelease_flag='--prerelease'
          fi

          {
            echo '## SillyTavern Android APK'
            echo
            echo '- Host version: ${{ needs.plan.outputs.host_version }}'
            echo '- Upstream repo: SillyTavern/SillyTavern'
            echo '- Upstream tag: ${{ needs.plan.outputs.tavern_tag }}'
            echo '- Build type: ${{ needs.plan.outputs.build_type }}'
            echo '- Rootfs source: ${{ needs.rootfs_prereq.outputs.source }}'
            echo '- Dependency source: ${{ needs.dependency_prereq.outputs.source }}'
            echo '- Server source: ${{ needs.server_prereq.outputs.source }}'
            echo '- Build source: ${{ needs.build.outputs.source }}'
            echo '- APK asset: ${{ needs.build.outputs.release_asset_name }}'
            echo '- APK SHA256: ${{ needs.build.outputs.apk_sha256 }}'
            echo '- APK size bytes: ${{ needs.build.outputs.apk_size_bytes }}'
            echo
            echo '## 本次更新内容'
            echo

            if [ '${{ github.event_name }}' = 'push' ] && [ '${{ github.event.before }}' != '0000000000000000000000000000000000000000' ]; then
              git log --pretty='- %h %s' '${{ github.event.before }}'..'${{ github.sha }}'
            else
              git log --pretty='- %h %s' -n 20 HEAD
            fi
          } > "$release_notes_file"

          if ! gh release view '${{ needs.plan.outputs.release_tag }}' --repo '${{ github.repository }}' > /dev/null 2>&1; then
            if [ -n "$prerelease_flag" ]; then
              gh release create '${{ needs.plan.outputs.release_tag }}' \
                --repo '${{ github.repository }}' \
                --target '${{ github.sha }}' \
                --title '${{ needs.plan.outputs.release_title }}' \
                --notes-file "$release_notes_file" \
                --prerelease
            else
              gh release create '${{ needs.plan.outputs.release_tag }}' \
                --repo '${{ github.repository }}' \
                --target '${{ github.sha }}' \
                --title '${{ needs.plan.outputs.release_title }}' \
                --notes-file "$release_notes_file"
            fi
          else
            gh release edit '${{ needs.plan.outputs.release_tag }}' \
              --repo '${{ github.repository }}' \
              --title '${{ needs.plan.outputs.release_title }}' \
              --notes-file "$release_notes_file" > /dev/null
          fi

          gh release upload '${{ needs.plan.outputs.release_tag }}' \
            "$release_dir"/*.apk \
            "$release_dir"/*.sha256 \
            "$release_dir"/*.update.json \
            --repo '${{ github.repository }}' \
            --clobber

      - name: Append publish summary
        run: |
          {
            echo '### Publish'
            echo
            echo '- Release tag: ${{ needs.plan.outputs.release_tag }}'
            echo '- Release title: ${{ needs.plan.outputs.release_title }}'
          } >> "$GITHUB_STEP_SUMMARY"
